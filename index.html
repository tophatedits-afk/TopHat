<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopHat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ================= EDIT ME =================
     Personalize everything in the CONFIG object
     inside the <script> tag near the bottom.
     Put your photo + song files in the SAME folder
     as this html file, then reference the filenames
     in CONFIG below.
     ============================================= */
:root{
  --bg-0:#0c0505;
  --bg-1:#140808;
  --glass:rgba(255,255,255,0.04);
  --glass-border:rgba(255,255,255,0.08);
  --text-hi:#fff0ee;
  --text-lo:#bd8f8c;
  --teal:#f43f5e;
  --teal-deep:#be123c;
  --teal-light:#fca5a5;
  --discord:#5865F2;
}

  *{box-sizing:border-box;}
  html,body{
    margin:0;
    min-height:100vh;
    background:var(--bg-0);
    font-family:'Inter',sans-serif;
    color:var(--text-hi);
    overflow-x:hidden;
  }

  .bg-glow{
    position:fixed;
    inset:0;
    z-index:0;
    background:
    radial-gradient(circle at 22% 25%, rgba(244,63,94,0.28), transparent 42%),
    radial-gradient(circle at 78% 35%, rgba(190,18,60,0.26), transparent 45%),
    radial-gradient(circle at 50% 90%, rgba(252,165,165,0.14), transparent 42%),
      var(--bg-1);
  }
  canvas#particles{
    position:fixed; inset:0; z-index:1; pointer-events:none; opacity:.5;
  }

  .stage{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }

  .card{
    position:relative;
    width:370px;
    max-width:100%;
    padding:32px 26px 24px;
    border-radius:18px;
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    box-shadow:0 18px 50px rgba(0,0,0,0.5), 0 0 40px rgba(244,63,94,0.10);
    text-align:center;
    animation:card-in .5s ease both;
  }
  @keyframes card-in{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }

  .card::before{
    content:'';
    position:absolute;
    inset:-1px;
    border-radius:19px;
    padding:1px;
    background:linear-gradient(135deg, var(--teal-deep), var(--teal), var(--teal-light));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    opacity:.45;
    z-index:-1;
    animation:pulse 3.5s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:.28;} 50%{opacity:.55;} }

  .views{
    position:absolute;
    top:13px; right:15px;
    font-size:11px;
    color:var(--text-lo);
    display:flex; align-items:center; gap:5px;
  }
  .views svg{width:12px;height:12px;opacity:.65;}

  .avatar-wrap{
    position:relative;
    width:88px; height:88px;
    margin:0 auto 14px;
  }
  .avatar{
    width:88px; height:88px;
    border-radius:50%;
    background:var(--bg-1) center/cover no-repeat;
    border:2px solid rgba(255,255,255,0.12);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:30px;
    color:var(--text-hi);
    box-shadow:0 0 24px rgba(244,63,94,0.22);
  }
  .status-dot{
    position:absolute;
    bottom:0; right:2px;
    width:16px; height:16px;
    border-radius:50%;
    background:#2ee67a;
    border:3px solid var(--bg-0);
  }

  .name-row{
    display:flex; align-items:center; justify-content:center; gap:6px;
    margin-bottom:2px;
  }
  .name{
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:21px;
    color:var(--text-hi);
  }
  .badge{ width:15px;height:15px;color:var(--teal); flex-shrink:0; }

  .handle{
    font-size:12.5px;
    color:var(--text-lo);
    margin-bottom:14px;
  }

  .bio{
    font-size:13.5px;
    color:var(--text-lo);
    line-height:1.55;
    margin-bottom:18px;
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:9px;
    margin-bottom:18px;
  }
  .link-btn{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 13px;
    border-radius:11px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--glass-border);
    color:var(--text-hi);
    text-decoration:none;
    font-size:13.5px;
    font-weight:500;
    transition:transform .15s ease, background .15s ease, border-color .15s ease;
  }
  .link-btn:hover{
    transform:translateY(-1px);
    background:rgba(255,255,255,0.06);
    border-color:rgba(244,63,94,0.45);
  }
  .link-btn svg{ width:16px; height:16px; flex-shrink:0; }
  .link-btn span{ margin-left:auto; opacity:.3; font-size:12px; }
  .link-btn.discord svg{ color:var(--discord); }

  /* ---------- real audio player ---------- */
  .player{
    padding:10px 12px;
    border-radius:11px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--glass-border);
  }
  .player-row{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .ctrl-btn{
    width:30px;height:30px;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.06);
    color:var(--text-hi);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    transition:background .15s ease, color .15s ease;
  }
  .ctrl-btn:hover{ background:rgba(244,63,94,0.18)}
  .ctrl-btn svg{ width:13px; height:13px; }
  .ctrl-btn.active{ color:var(--teal); background:rgba(244,63,94,0.15); }

  .play-btn{
    width:34px;height:34px;
    border-radius:8px;
    border:none;
    background:linear-gradient(135deg,var(--teal),var(--teal-deep));
    color:#3f0510;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .play-btn svg{ width:15px; height:15px; }
  .meta{ text-align:left; overflow:hidden; flex:1; min-width:0; }
  .title{ font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .artist{ font-size:11px; color:var(--text-lo); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bars{ display:flex; gap:2px; height:16px; align-items:flex-end; flex-shrink:0; }
  .bars span{ width:3px; background:var(--teal); border-radius:2px; height:4px; transition:height .08s ease; }
  .seek{
    -webkit-appearance:none;
    width:100%;
    height:3px;
    border-radius:2px;
    background:rgba(255,255,255,0.12);
    margin-top:9px;
    cursor:pointer;
  }
  .seek::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:9px;height:9px;border-radius:50%;
    background:var(--teal);
  }
  .no-song-hint{
    font-size:10.5px;
    color:var(--text-lo);
    text-align:left;
    margin-top:2px;
  }

  .footer-tag{
    margin-top:16px;
    font-size:10px;
    color:rgba(189,143,140,0.45);
  }
  .footer-tag b{ color:rgba(244,63,94,0.7); }

  @media (prefers-reduced-motion: reduce){
    .card::before{ animation:none !important; }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>
<canvas id="particles"></canvas>

<div class="stage">
  <div class="card">
    <div class="views" id="views">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
      <span id="viewCount">0</span>
    </div>

    <div class="avatar-wrap">
      <div class="avatar" id="avatar"></div>
      <div class="status-dot"></div>
    </div>

    <div class="name-row">
      <span class="name" id="displayName">her name</span>
    </div>
    <div class="handle" id="handle">@handle</div>

    <div class="bio" id="bioText"></div>

    <div class="links" id="linkList"></div>

    <div class="player" id="playerWrap">
      <div class="player-row">
        <button class="ctrl-btn" id="prevBtn" title="previous">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM20 6v12L9 12z"/></svg>
        </button>
        <button class="play-btn" id="playBtn">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" id="nextBtn" title="next">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 6h-2v12h2zM4 6v12l11-6z"/></svg>
        </button>
        <div class="meta">
          <div class="title" id="songTitle">song title</div>
          <div class="artist" id="songArtist">artist</div>
        </div>
        <div class="bars"><span></span><span></span><span></span><span></span><span></span></div>
        <button class="ctrl-btn" id="shuffleBtn" title="shuffle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h4l8 12h4M4 18h4l3-4.5M15 6h5v5M15 6l6 6M20 18l-2.5-2.5"/></svg>
        </button>
      </div>
      <input type="range" class="seek" id="seek" value="0" min="0" max="100" step="0.1">
      <div class="no-song-hint" id="noSongHint" style="display:none;">add songs in CONFIG.songs to make this play real music</div>
      <audio id="audioEl" preload="metadata"></audio>
    </div>

    <div class="footer-tag">I'm taken♡</div>
  </div>
</div>

<script>
/* =====================================================
   CONFIG — edit everything here
   ===================================================== */
const CONFIG = {
  name: "TopHat",
  handle: "@tophatyt",
  avatarInitial: "TH",
  avatarImage: "pfp1.png",            // e.g. "photo.jpg" — put next to this html file

  bio: "You only get one shot. Why waste it? Shoot with all you've got because you will never get a second chance.",

  // put real audio files (mp3/m4a/wav) next to this html and list them here.
  // the player will really play them, shuffle between them, and the bars
  // react to the actual audio. leave the array empty to show a static preview.
  songs: [
    { file: "505.mp3", title: "505", artist: "Artic Monkeys" },
    { file: "creep.mp3", title: "Creep", artist: "Radiohead" },
    { file: "nottypingallthat.mp3", title: "Nope your too late i already died", artist: "Wifiskeleton" },
    { file: "wannabeyours.mp3", title: "Wanna Be Yours", artist: "Artic Monkeys" },
  ],

  links: [
    { label: "Spotify",   url: "https://open.spotify.com/user/31wc2tzbsidghgnvtgcf2t4gqpsa", icon: "spotify" },
    { label: "YouTube",   url: "https://www.youtube.com/@TopHat_Edits", icon: "youtube" },
    { label: "Roblox",    url: "https://www.roblox.com/users/3499098117/profile", icon: "roblox" },
  ],
  startingViews: 1
};

const ICONS = {
  instagram: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1"/></svg>',
  spotify: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.6 14.4c-.18.3-.56.4-.86.22-2.36-1.44-5.32-1.76-8.82-.96-.34.08-.68-.14-.76-.48-.08-.34.14-.68.48-.76 3.84-.88 7.14-.5 9.78 1.12.3.18.4.56.18.86zm1.22-2.72c-.22.36-.7.48-1.06.26-2.7-1.66-6.82-2.14-10-.6-.4.2-.9.03-1.1-.37-.2-.4-.03-.9.37-1.1 3.64-1.78 8.18-1.24 11.28.66.36.22.48.7.26 1.06zm.1-2.84C14.6 9.2 9.6 9.02 6.7 9.9c-.46.14-.95-.12-1.09-.58-.14-.46.12-.95.58-1.09 3.36-1.02 8.9-.8 12.42 1.24.42.24.56.78.32 1.2-.24.42-.78.56-1.2.32z"/></svg>',
  tiktok: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.6 5.82a4.28 4.28 0 0 1-2.63-1.07v8.94a5.3 5.3 0 1 1-4.55-5.24v2.2a3.1 3.1 0 1 0 2.35 3.01V2h2.2a4.28 4.28 0 0 0 2.63 3.61z"/></svg>',
  youtube: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.6 7.2s-.2-1.5-.8-2.1c-.8-.8-1.7-.8-2.1-.9C15.9 4 12 4 12 4h0s-3.9 0-6.7.2c-.4.1-1.3.1-2.1.9-.6.6-.8 2.1-.8 2.1S2.2 9 2.2 10.8v1.4C2.2 14 2.4 15.8 2.4 15.8s.2 1.5.8 2.1c.8.8 1.8.8 2.3.9 1.7.2 7.2.2 7.2.2s3.9 0 6.7-.2c.4-.1 1.3-.1 2.1-.9.6-.6.8-2.1.8-2.1s.2-1.8.2-3.6v-1.4c0-1.8-.2-3.6-.2-3.6zM9.9 15V9l6 3-6 3z"/></svg>',
  roblox: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.2 2.5 2.5 17.8l15.3 3.7L21.5 6.2 6.2 2.5zm2.1 5.4 6.8 1.6-1.6 6.8-6.8-1.6 1.6-6.8z"/></svg>',
  link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 14a5 5 0 0 0 7 0l3-3a5 5 0 1 0-7-7l-1 1"/><path d="M14 10a5 5 0 0 0-7 0l-3 3a5 5 0 1 0 7 7l1-1"/></svg>'
};

document.getElementById('displayName').textContent = CONFIG.name;
document.getElementById('handle').textContent = CONFIG.handle;
document.getElementById('bioText').textContent = CONFIG.bio;

const avatarEl = document.getElementById('avatar');
if(CONFIG.avatarImage){
  avatarEl.style.backgroundImage = `url('${CONFIG.avatarImage}')`;
} else {
  avatarEl.textContent = CONFIG.avatarInitial;
}

const linkList = document.getElementById('linkList');
CONFIG.links.forEach(l=>{
  const a = document.createElement('a');
  a.href = l.url;
  a.target = "_blank";
  a.rel = "noopener";
  a.className = "link-btn";
  a.innerHTML = (ICONS[l.icon] || ICONS.link) + l.label + `<span>&rarr;</span>`;
  linkList.appendChild(a);
});

/* ---------- real audio player with shuffle ---------- */
(function player(){
  const audio = document.getElementById('audioEl');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const titleEl = document.getElementById('songTitle');
  const artistEl = document.getElementById('songArtist');
  const bars = document.querySelectorAll('.bars span');
  const seek = document.getElementById('seek');
  const hint = document.getElementById('noSongHint');

  const PAUSE_ICON = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  const PLAY_ICON = '<path d="M8 5v14l11-7z"/>';

  const songs = CONFIG.songs || [];
  if(songs.length === 0){
    titleEl.textContent = CONFIG.song ? CONFIG.song.title : "no songs added yet";
    artistEl.textContent = CONFIG.song ? CONFIG.song.artist : "";
    hint.style.display = 'block';
    [playBtn, prevBtn, nextBtn, shuffleBtn].forEach(b=>{ b.disabled = true; b.style.opacity = .4; b.style.cursor = 'default'; });
    return;
  }

  let shuffle = false;
  let played = [];     // history of indices already played, for shuffle mode
  let current = 0;

  function loadSong(i, autoplay){
    current = i;
    const s = songs[i];
    audio.src = s.file;
    titleEl.textContent = s.title;
    artistEl.textContent = s.artist;
    seek.value = 0;
    if(autoplay){
      audio.play();
      playIcon.innerHTML = PAUSE_ICON;
      draw();
    }
  }

  function nextIndex(){
    if(!shuffle || songs.length === 1) return (current + 1) % songs.length;
    if(played.length >= songs.length) played = [];
    let choices = songs.map((_,i)=>i).filter(i => i !== current && !played.includes(i));
    if(choices.length === 0) choices = songs.map((_,i)=>i).filter(i => i !== current);
    const pick = choices[Math.floor(Math.random()*choices.length)];
    played.push(current);
    return pick;
  }

  function prevIndex(){
    return (current - 1 + songs.length) % songs.length;
  }

  let audioCtx, analyser, source, dataArray;
  function setupAnalyser(){
    if(audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 32;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
  }

  function draw(){
    if(!audio.paused){
      analyser.getByteFrequencyData(dataArray);
      bars.forEach((b,i)=>{
        const v = dataArray[i*2] || 0;
        b.style.height = Math.max(4, (v/255)*16) + 'px';
      });
      requestAnimationFrame(draw);
    } else {
      bars.forEach(b=> b.style.height = '4px');
    }
  }

  loadSong(0, false);

  playBtn.addEventListener('click', ()=>{
    setupAnalyser();
    if(audio.paused){
      audio.play();
      playIcon.innerHTML = PAUSE_ICON;
      draw();
    } else {
      audio.pause();
      playIcon.innerHTML = PLAY_ICON;
    }
  });

  nextBtn.addEventListener('click', ()=>{
    setupAnalyser();
    loadSong(nextIndex(), true);
  });
  prevBtn.addEventListener('click', ()=>{
    setupAnalyser();
    loadSong(prevIndex(), true);
  });
  shuffleBtn.addEventListener('click', ()=>{
    shuffle = !shuffle;
    played = [];
    shuffleBtn.classList.toggle('active', shuffle);
  });

  audio.addEventListener('timeupdate', ()=>{
    if(audio.duration) seek.value = (audio.currentTime/audio.duration)*100;
  });
  seek.addEventListener('input', ()=>{
    if(audio.duration) audio.currentTime = (seek.value/100)*audio.duration;
  });
  audio.addEventListener('ended', ()=>{
    setupAnalyser();
    loadSong(nextIndex(), true);
  });
})();

/* view counter */
(function views(){
  let v = CONFIG.startingViews + Math.floor(Math.random()*40);
  const el = document.getElementById('viewCount');
  let cur = 0;
  const t = setInterval(()=>{
    cur += Math.ceil(v/24);
    if(cur >= v){ cur = v; clearInterval(t); }
    el.textContent = cur.toLocaleString();
  }, 40);
})();

/* light ambient particles */
(function particles(){
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w,h,parts;
  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  function init(){
    resize();
    parts = Array.from({length:26}, ()=>({
      x:Math.random()*w, y:Math.random()*h,
      r:Math.random()*1.3+0.3,
      vx:(Math.random()-0.5)*0.1,
      vy:(Math.random()-0.5)*0.1,
      hue: Math.random()>0.5 ? '244,63,94' : '252,165,165'
    }));
  }
  function frame(){
    ctx.clearRect(0,0,w,h);
    parts.forEach(p=>{
      p.x += p.vx; p.y += p.vy;
      if(p.x<0||p.x>w) p.vx*=-1;
      if(p.y<0||p.y>h) p.vy*=-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(${p.hue},0.4)`;
      ctx.fill();
    });
    requestAnimationFrame(frame);
  }
  window.addEventListener('resize', resize);
  init();
  frame();
})();
</script>
</body>
</html>
